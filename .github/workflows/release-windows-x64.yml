name: release-windows-x64

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release
        run: cargo build -p switch2-procon-app --release --locked --target x86_64-pc-windows-msvc

      - name: Package artifact
        shell: pwsh
        run: |
          $out = "dist"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/switch2-procon-app.exe" "$out/switch2-procon-app.exe"
          Compress-Archive -Path "$out/switch2-procon-app.exe" -DestinationPath "switch2-procon-windows-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: switch2-procon-windows-x64
          path: switch2-procon-windows-x64.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: switch2-procon-windows-x64.zip
          generate_release_notes: true
