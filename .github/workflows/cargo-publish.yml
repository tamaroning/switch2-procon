name: cargo-publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish --dry-run instead of publishing"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify crate version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME -replace '^v', ''
          $meta = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $version = ($meta.packages | Where-Object { $_.name -eq 'switch2-procon' }).version
          if ($tag -ne $version) {
            throw "Tag v$tag does not match switch2-procon version $version"
          }

      - name: Publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: cargo publish -p switch2-procon --locked --dry-run

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p switch2-procon --locked
